<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MarkView promo tile 440×280</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 440px; height: 280px; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
    color: #e2e8f0;
  }
  .tile {
    width: 440px; height: 280px;
    display: grid;
    grid-template-columns: 160px 1fr;
    align-items: center;
    padding: 24px 28px 24px 24px;
    box-sizing: border-box;
    position: relative;
  }
  .logo-wrap {
    width: 144px; height: 144px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  }
  .logo-wrap img { width: 112px; height: 112px; }
  .text { padding-left: 12px; }
  h1 {
    margin: 0 0 10px 0;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #ffffff;
    line-height: 1;
  }
  .tag {
    font-size: 16px;
    font-weight: 500;
    color: #94a3b8;
    line-height: 1.35;
    margin-bottom: 14px;
  }
  .chips {
    display: flex; flex-wrap: wrap; gap: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .chip {
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(56, 189, 248, 0.14);
    color: #7dd3fc;
    border: 1px solid rgba(56, 189, 248, 0.28);
  }
  .chip.green {
    background: rgba(34, 197, 94, 0.14);
    color: #86efac;
    border-color: rgba(34, 197, 94, 0.28);
  }
  /* subtle accent rule along the bottom */
  .tile::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 3px;
    background: linear-gradient(90deg, #38bdf8 0%, #22c55e 50%, #f59e0b 100%);
  }
</style>
</head>
<body>
  <div class="tile">
    <div class="logo-wrap">
      <img src="logo.png" alt="MarkView logo">
    </div>
    <div class="text">
      <h1>MarkView</h1>
      <div class="tag">Markdown, rendered anywhere —<br>on disk, on the web, in every cloud.</div>
      <div class="chips">
        <span class="chip">Mermaid</span>
        <span class="chip">KaTeX</span>
        <span class="chip green">Open source</span>
      </div>
    </div>
  </div>
</body>
</html>
