<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkView</title>
    <script src="marked.min.js"></script>
    <script src="purify.min.js"></script>
    <script src="markview-renderer.js"></script>
    <script src="markview-toolbar.js"></script>
    <script src="error-toast.js"></script>
    <script src="codemirror-bundle.js"></script>
    <link rel="stylesheet" href="markview-themes.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
        }
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #666;
            font-size: 14px;
        }
        #content {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
        }
        #content img, #content svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>
    <div id="content" class="mv-content" style="display:none"></div>
    <script src="viewer-init.js"></script>
</body>
</html>
