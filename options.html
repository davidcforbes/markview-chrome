<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarkView Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: #24292e;
      background: #f6f8fa;
      padding: 2rem;
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    fieldset {
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1rem;
      background: #ffffff;
    }

    legend {
      font-weight: 600;
      padding: 0 0.5rem;
    }

    label {
      display: block;
      margin: 0.5rem 0 0.25rem;
      font-weight: 500;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 0.4rem 0.6rem;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 14px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.5rem 0;
    }

    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }

    button {
      margin-top: 1rem;
      padding: 0.5rem 1.25rem;
      background: #2ea44f;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #2c974b;
    }

    #status {
      margin-top: 0.75rem;
      color: #22863a;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h1>MarkView Options</h1>

  <fieldset>
    <legend>Appearance</legend>
    <label for="theme">Theme</label>
    <select id="theme">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
      <option value="system">System (auto)</option>
    </select>
  </fieldset>

  <fieldset>
    <legend>Editor</legend>
    <label for="defaultEditor">Default external editor path</label>
    <input type="text" id="defaultEditor" placeholder="e.g. C:\Program Files\VS Code\Code.exe" />
  </fieldset>

  <fieldset>
    <legend>Features</legend>
    <div class="checkbox-row">
      <input type="checkbox" id="enableMermaid" checked />
      <label for="enableMermaid" style="display:inline; margin:0;">Enable Mermaid diagrams</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="enableSyntaxHighlight" checked />
      <label for="enableSyntaxHighlight" style="display:inline; margin:0;">Enable syntax highlighting</label>
    </div>
  </fieldset>

  <fieldset>
    <legend>Cloud Storage</legend>
    <label for="cloudProvider">Provider</label>
    <select id="cloudProvider">
      <option value="">None</option>
      <option value="onedrive">OneDrive / SharePoint</option>
      <option value="gdrive">Google Drive</option>
    </select>
    <p style="margin-top:0.5rem; color:#6a737d; font-size:13px;">
      Cloud storage integration requires the optional <em>identity</em> permission.
    </p>
  </fieldset>

  <button id="save">Save Settings</button>
  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
