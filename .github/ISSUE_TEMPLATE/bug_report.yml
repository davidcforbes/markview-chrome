name: Bug Report
description: Report a bug or unexpected behavior in MarkView
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open file '...'
        2. Scroll to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
      placeholder: Paste screenshots here...
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which version of Windows are you using?
      options:
        - Windows 10
        - Windows 11
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of MarkView are you using?
      placeholder: e.g. 0.1.0
    validations:
      required: true
